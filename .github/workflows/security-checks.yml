name: Security Checks

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  public-leak-guard:
    runs-on: ubuntu-latest
    env:
      # GitHub: actions/checkout·setup-node 내부 런타임 Node 20 폐기 대비 (경고 완화)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify public response leaks
        run: npm run verify:public-leaks

      - name: Verify Prisma runtime policy
        run: npm run verify:prisma-runtime-policy
