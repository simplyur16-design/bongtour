name: Security Checks

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  public-leak-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify public response leaks
        run: npm run verify:public-leaks

      - name: Verify Prisma runtime policy
        run: npm run verify:prisma-runtime-policy
